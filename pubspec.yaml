name: rtc_rnnoise
description: A high-performance AI noise reduction plugin for Flutter WebRTC, based on RNNoise. Features real-time VAD and zero-latency native audio processing via pre-compiled binaries.
version: 0.1.0
repository: https://github.com/your-username/rtc_rnnoise
issue_tracker: https://github.com/your-username/rtc_rnnoise/issues
topics:
  - webrtc
  - audio
  - noise-reduction
  - ai
  - native-ffi

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.rtc.rnnoise.rtc_rnnoise
        pluginClass: RtcRnnoisePlugin
      ios:
        pluginClass: RtcRnnoisePlugin
